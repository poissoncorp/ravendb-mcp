name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write   # GitHub OIDC for MCP Registry (io.github.* namespace) publish

jobs:
  package:
    runs-on: ubuntu-latest

    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Verify version sync
        shell: pwsh
        run: |
          $csproj = [xml](Get-Content src/RavenDB.Mcp/RavenDB.Mcp.csproj)
          $version = ($csproj.Project.PropertyGroup | Where-Object { $_.Version }).Version
          $server = Get-Content .mcp/server.json -Raw | ConvertFrom-Json
          if ($version -ne $server.version -or $version -ne $server.packages[0].version) {
            Write-Error "Version mismatch: csproj=$version server.json.version=$($server.version) packages[0].version=$($server.packages[0].version)"
            exit 1
          }
          Write-Output "Versions in sync: $version"

      - name: Restore
        run: dotnet restore RavenDB.Mcp.slnx

      - name: Test package-safe suite
        run: dotnet test RavenDB.Mcp.slnx --configuration Release --no-restore --filter "FullyQualifiedName~DocumentStoreFactoryTests|FullyQualifiedName~RavenDbOptionsValidatorTests|FullyQualifiedName~McpToolContractTests|FullyQualifiedName~RawHttpDiagnosticsTests"

      - name: Pack NuGet tool
        run: dotnet pack src/RavenDB.Mcp/RavenDB.Mcp.csproj --configuration Release --no-restore --output artifacts/package

      - name: Push to NuGet.org
        if: ${{ env.NUGET_API_KEY != '' }}
        run: dotnet nuget push "artifacts/package/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

      # Submit the same .mcp/server.json to the community MCP Registry. Gated on a real tagged
      # release that also pushed to NuGet (the registry validates the NuGet package exists).
      # Auth uses GitHub OIDC for the io.github.<owner> namespace — no stored secret needed.
      - name: Publish to MCP Registry
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.NUGET_API_KEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"

          echo "Waiting for RavenDB.Mcp $version to be indexed on NuGet.org…"
          for i in $(seq 1 30); do
            if curl -sf "https://api.nuget.org/v3-flatcontainer/ravendb.mcp/index.json" | grep -q "\"$version\""; then
              echo "Package indexed."; break
            fi
            echo "  not indexed yet ($i/30)…"; sleep 20
          done

          echo "Installing mcp-publisher…"
          url=$(curl -s https://api.github.com/repos/modelcontextprotocol/registry/releases/latest \
            | jq -r '.assets[] | select(.name | test("linux_amd64")) | .browser_download_url' | head -1)
          curl -L "$url" -o mcp-publisher.tar.gz
          tar -xzf mcp-publisher.tar.gz mcp-publisher

          # mcp-publisher reads ./server.json by default.
          cp .mcp/server.json ./server.json
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

      - name: Publish self-contained executables
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $runtimes = @('win-x64', 'linux-x64', 'osx-x64', 'osx-arm64')

          foreach ($runtime in $runtimes) {
            dotnet publish src/RavenDB.Mcp/RavenDB.Mcp.csproj `
              --configuration Release `
              --runtime $runtime `
              --self-contained true `
              --output "artifacts/publish/$runtime" `
              /p:PublishSingleFile=true

            if ($runtime.StartsWith('win-')) {
              Compress-Archive `
                -Path "artifacts/publish/$runtime/*" `
                -DestinationPath "artifacts/package/ravendb-mcp-$runtime.zip" `
                -Force
            } else {
              tar -czf "artifacts/package/ravendb-mcp-$runtime.tar.gz" -C "artifacts/publish/$runtime" .
            }
          }

      - name: Generate checksums
        shell: pwsh
        run: |
          Get-ChildItem artifacts/package -File |
            Sort-Object Name |
            ForEach-Object {
              $hash = Get-FileHash $_.FullName -Algorithm SHA256
              "$($hash.Hash.ToLowerInvariant())  $($_.Name)"
            } |
            Set-Content artifacts/package/checksums.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ravendb-mcp-release
          path: artifacts/package/*

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" artifacts/package/* --generate-notes --verify-tag
